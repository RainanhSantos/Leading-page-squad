<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#0f172a"/>
  <rect x="1" y="1" width="398" height="278" rx="6" fill="none" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Background glow -->
  <ellipse cx="200" cy="130" rx="100" ry="80" fill="#1e3a5f" opacity="0.5"/>

  <!-- Flame (orange) -->
  <path d="M170 180 Q155 140 170 110 Q160 130 180 115 Q165 150 195 130 Q175 160 200 140 Q185 170 210 155 Q195 185 170 180Z" fill="#f97316" opacity="0.85"/>

  <!-- Lightning bolt (blue) -->
  <polygon points="210,65 183,138 207,138 192,210 230,125 206,125" fill="#3b82f6"/>

  <!-- Wrench icon (top left) -->
  <g transform="translate(80,70) rotate(-45)" opacity="0.6">
    <rect x="-5" y="-30" width="10" height="50" rx="5" fill="#64748b"/>
    <circle cx="0" cy="-30" r="12" fill="none" stroke="#64748b" stroke-width="4"/>
    <rect x="-5" y="18" width="10" height="12" rx="3" fill="#64748b"/>
  </g>

  <!-- Sparks -->
  <line x1="240" y1="85" x2="255" y2="75" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="248" y1="100" x2="265" y2="95" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="238" y1="115" x2="258" y2="115" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Label background -->
  <rect x="60" y="225" width="280" height="38" rx="6" fill="#1e293b"/>
  <!-- Label text -->
  <text x="200" y="249" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#94a3b8" text-anchor="middle">Manutenção Corretiva</text>
</svg>
