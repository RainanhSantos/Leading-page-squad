<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#0f172a"/>
  <rect x="1" y="1" width="398" height="278" rx="6" fill="none" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Old cubicle (left, worn/obsolete) -->
  <rect x="55" y="55" width="110" height="155" rx="5" fill="#1e293b" stroke="#475569" stroke-width="2.5"/>
  <rect x="68" y="72" width="84" height="50" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="110" y="104" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">1984</text>
  <circle cx="110" cy="148" r="16" fill="none" stroke="#475569" stroke-width="2"/>
  <line x1="110" y1="132" x2="110" y2="142" stroke="#475569" stroke-width="2"/>
  <rect x="85" y="170" width="50" height="8" rx="2" fill="#334155"/>
  <rect x="85" y="184" width="35" height="8" rx="2" fill="#334155"/>
  <!-- X mark on old cubicle -->
  <line x1="72" y1="60" x2="158" y2="203" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="158" y1="60" x2="72" y2="203" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Arrow -->
  <line x1="175" y1="132" x2="218" y2="132" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="215,126 228,132 215,138" fill="#64748b"/>

  <!-- New cubicle (right, modern) -->
  <rect x="235" y="55" width="110" height="155" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
  <rect x="248" y="72" width="84" height="50" rx="3" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="258" y="82" width="64" height="6" rx="2" fill="#3b82f6" opacity="0.7"/>
  <rect x="258" y="94" width="48" height="6" rx="2" fill="#3b82f6" opacity="0.5"/>
  <rect x="258" y="106" width="54" height="6" rx="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="290" cy="148" r="16" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <line x1="290" y1="132" x2="290" y2="142" stroke="#3b82f6" stroke-width="2"/>
  <rect x="265" y="170" width="50" height="8" rx="2" fill="#1e3a5f"/>
  <rect x="265" y="184" width="35" height="8" rx="2" fill="#1e3a5f"/>

  <!-- NR10 badge on new cubicle -->
  <rect x="258" y="200" width="64" height="22" rx="11" fill="#22c55e"/>
  <text x="290" y="215" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">NR10</text>

  <!-- Label background -->
  <rect x="60" y="225" width="280" height="38" rx="6" fill="#1e293b"/>
  <text x="200" y="249" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#94a3b8" text-anchor="middle">Adequação à requisitos legais</text>
</svg>
